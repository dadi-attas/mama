<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב הוצאות - אמא</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; }

    /* מסך בחירת משתמש */
    .user-select-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    }
    .user-select-screen h1 {
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    .user-select-screen p {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }
    .user-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .user-btn {
      background: white;
      border: none;
      border-radius: 12px;
      padding: 16px 24px;
      font-family: 'Heebo', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a73e8;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .user-btn:active { transform: scale(0.97); }

    /* דשבורד */
    .dashboard-screen { display: none; padding: 0; }
    .top-bar {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 20px 20px 24px;
      color: white;
    }
    .top-bar h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .top-bar .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top-bar .username { font-size: 13px; opacity: 0.85; }
    .switch-user-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'Heebo', sans-serif;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
    }
    /* דשבורד */
    .dashboard-content { padding: 16px; }

    .summary-cards-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      border-right: 4px solid #1a73e8;
    }

    .summary-card:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .card-label { font-size: 15px; color: #555; font-weight: 500; }

    .card-amount { font-size: 22px; font-weight: 700; color: #1a1a2e; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #aaa;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    /* סיכום אחים */
    .siblings-section { margin-bottom: 24px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      margin-bottom: 10px;
      padding-right: 4px;
    }
    .sibling-card {
      background: white;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .sibling-card:active { transform: scale(0.98); }
    .sibling-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .sibling-name { font-size: 17px; font-weight: 700; color: #1a1a2e; }
    .sibling-status {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .status-balanced { background: #e8f5e9; color: #2e7d32; }
    .status-credit { background: #fff3e0; color: #e65100; }
    .status-owed { background: #ffebee; color: #c62828; }
    .sibling-rows { display: flex; flex-direction: column; gap: 6px; }
    .sibling-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
    }
    .sibling-row span:last-child { font-weight: 600; color: #1a1a2e; }
    .sibling-balance-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }
    .empty-text { font-size: 16px; }
    /* כפתור הוספה */
    .add-btn {
      width: 100%;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .add-btn:active { background: #0d47a1; }
    .reset-btn {
      width: 100%;
      background: transparent;
      color: #c62828;
      border: 1.5px solid #c62828;
      border-radius: 12px;
      padding: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    /* מסך הוספה */
    .add-screen {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: #f5f7fa;
      z-index: 100;
      overflow-y: auto;
      max-width: 480px;
      margin: 0 auto;
    }
    .screen-header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .screen-header h2 { font-size: 18px; font-weight: 700; }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .form-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      color: #1a1a2e;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #1a73e8; }
    .form-error {
      background: #ffebee;
      color: #c62828;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .save-btn {
      width: 100%;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .save-btn:active { background: #0d47a1; }
  </style>
</head>
<body>
<div id="app">

  <!-- מסך בחירת משתמש -->
  <div class="user-select-screen" id="userSelectScreen">
    <h1>מעקב הוצאות</h1>
    <p>טיפול באמא - בחר את שמך להמשך</p>
    <div class="user-buttons">
      <button class="user-btn" onclick="selectUser('dadi', 'דדי', 'admin')">דדי</button>
      <button class="user-btn" onclick="selectUser('eti', 'אתי', 'viewer')">אתי</button>
      <button class="user-btn" onclick="selectUser('orly', 'אורלי', 'viewer')">אורלי</button>
    </div>
  </div>

  <!-- דשבורד -->
  <div class="dashboard-screen" id="dashboardScreen">
    <div class="top-bar">
      <div class="user-info">
        <h1>מעקב הוצאות - אמא</h1>
        <button class="switch-user-btn" onclick="switchUser()">החלף משתמש</button>
      </div>
      <div class="username" id="currentUserName"></div>
    </div>
    <div class="dashboard-content" id="dashboardContent">
      <!-- כרטיסי סיכום ראשיים -->
      <div class="summary-cards-section">
        <div class="summary-card" onclick="openHistory('family_expense')">
          <div class="card-label">הוצאות פרטיות של אחים</div>
          <div class="card-amount" id="totalFamilyExpense">₪0</div>
        </div>
        <div class="summary-card" onclick="openHistory('parent_funded_expense')">
          <div class="card-label">הוצאות מכספי ההורה</div>
          <div class="card-amount" id="totalParentFunded">₪0</div>
        </div>
        <div class="summary-card" onclick="openHistory('advance_to_sibling')">
          <div class="card-label">העברות לאחים</div>
          <div class="card-amount" id="totalAdvances">₪0</div>
        </div>
        <div class="summary-card" onclick="openHistory('reimbursement_to_sibling')">
          <div class="card-label">החזרים</div>
          <div class="card-amount" id="totalReimbursements">₪0</div>
        </div>
        <div class="summary-card" onclick="openHistory('all')">
          <div class="card-label">סך כל הפעולות</div>
          <div class="card-amount" id="totalTransactions">0</div>
        </div>
      </div>

      <!-- סיכום לפי אח/אחות -->
      <div class="siblings-section">
        <div class="section-title">מצב לפי אח/אחות</div>
        <div id="siblingCards"></div>
      </div>

      <!-- כפתור הוספה - נראה רק לאדמין -->
      <div id="addBtnContainer" style="display:none;">
        <button class="add-btn" onclick="openAddScreen()">+ הוסף פעולה</button>
        <button class="reset-btn" onclick="resetAllTransactions()">🗑️ איפוס כל התנועות (פיתוח)</button>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">📋</div>
        <div class="empty-text">עדיין לא הוזנו תנועות</div>
      </div>
    </div>
  </div>

  <!-- מסך הוספת פעולה -->
  <div class="add-screen" id="addScreen" style="display:none;">
    <div class="screen-header">
      <button class="back-btn" onclick="closeAddScreen()">→ חזרה</button>
      <h2>הוספת פעולה</h2>
    </div>
    <div class="form-body">

      <div class="form-group">
        <label>סוג פעולה *</label>
        <select id="txnType" onchange="onTypeChange()">
          <option value="">בחר סוג...</option>
          <option value="family_expense">הוצאה פרטית של אח/אחות</option>
          <option value="parent_funded_expense">הוצאה מכספי ההורה</option>
          <option value="advance_to_sibling">העברה לאח/אחות מכספי ההורה</option>
          <option value="reimbursement_to_sibling">החזר לאח/אחות</option>
        </select>
      </div>

      <div class="form-group" id="personField" style="display:none;">
        <label id="personLabel">שם האח/אחות *</label>
        <select id="txnPerson">
          <option value="">בחר...</option>
          <option value="dadi">דדי</option>
          <option value="eti">אתי</option>
          <option value="orly">אורלי</option>
        </select>
      </div>

      <div class="form-group">
        <label>תאריך *</label>
        <input type="date" id="txnDate" />
      </div>

      <div class="form-group" id="amountField">
        <label>סכום (₪) *</label>
        <input type="number" id="txnAmount" placeholder="0" min="0" />
      </div>

      <div class="form-group" id="categoryField" style="display:none;">
        <label>קטגוריה</label>
        <select id="txnCategory">
          <option value="">בחר קטגוריה...</option>
          <option value="ציוד רפואי">ציוד רפואי</option>
          <option value="ציוד סיעודי">ציוד סיעודי</option>
          <option value="חיתולים / מוצרי ספיגה">חיתולים / מוצרי ספיגה</option>
          <option value="אגרות / תשלומים למדינה">אגרות / תשלומים למדינה</option>
          <option value="מטפל / שירות טיפולי">מטפל / שירות טיפולי</option>
          <option value="חוות דעת / ייעוץ רפואי">חוות דעת / ייעוץ רפואי</option>
          <option value="תרופות / פארם">תרופות / פארם</option>
          <option value="נסיעות / לוגיסטיקה">נסיעות / לוגיסטיקה</option>
          <option value="אחר">אחר</option>
        </select>
      </div>

      <div class="form-group">
        <label>תיאור</label>
        <input type="text" id="txnDescription" placeholder="תיאור קצר..." />
      </div>

      <div class="form-group">
        <label>הערות</label>
        <textarea id="txnNotes" placeholder="הערות נוספות..." rows="3"></textarea>
      </div>

      <div class="form-error" id="formError" style="display:none;"></div>

      <button class="save-btn" onclick="saveTransaction()">שמור פעולה</button>

    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu6wAd5pErreSzhScx5kq2wZozC9auJ1M",
    authDomain: "mama-895ec.firebaseapp.com",
    projectId: "mama-895ec",
    storageBucket: "mama-895ec.firebasestorage.app",
    messagingSenderId: "898334683846",
    appId: "1:898334683846:web:9a22d3054cf04816ff9dc7"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app);
  window.storage = getStorage(app);
  console.log('Firebase מחובר ✅');
  window.firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
  // בחירת משתמש
  function selectUser(id, name, role) {
    localStorage.setItem('mama_user_id', id);
    localStorage.setItem('mama_user_name', name);
    localStorage.setItem('mama_user_role', role);
    showDashboard(name);
  }

  function switchUser() {
    localStorage.removeItem('mama_user_id');
    localStorage.removeItem('mama_user_name');
    localStorage.removeItem('mama_user_role');
    document.getElementById('dashboardScreen').style.display = 'none';
    document.getElementById('userSelectScreen').style.display = 'flex';
  }

  function showDashboard(name) {
    document.getElementById('userSelectScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    document.getElementById('currentUserName').textContent = 'שלום, ' + name;
    // כפתור הוספה רק לאדמין
    const role = localStorage.getItem('mama_user_role');
    if (role === 'admin') {
      document.getElementById('addBtnContainer').style.display = 'block';
    }
    loadDashboard();
  }

  async function resetAllTransactions() {
    if (!confirm('למחוק את כל התנועות? פעולה זו לא ניתנת לביטול.')) return;
    try {
      const { collection, getDocs, deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snapshot = await getDocs(collection(window.db, 'transactions'));
      const deletes = [];
      snapshot.forEach(d => deletes.push(deleteDoc(doc(window.db, 'transactions', d.id))));
      await Promise.all(deletes);
      await loadDashboard();
      alert('כל התנועות נמחקו ✅');
    } catch(e) {
      alert('שגיאה במחיקה: ' + e.message);
    }
  }

  // פתיחת/סגירת מסך הוספה
  function openAddScreen() {
    document.getElementById('addScreen').style.display = 'block';
    // הגדרת תאריך היום כברירת מחדל
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('txnDate').value = today;
  }

  function closeAddScreen() {
    document.getElementById('addScreen').style.display = 'none';
    resetForm();
  }

  function resetForm() {
    document.getElementById('txnType').value = '';
    document.getElementById('txnPerson').value = '';
    document.getElementById('txnDate').value = '';
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnCategory').value = '';
    document.getElementById('txnDescription').value = '';
    document.getElementById('txnNotes').value = '';
    document.getElementById('formError').style.display = 'none';
    onTypeChange();
  }

  function onTypeChange() {
    const type = document.getElementById('txnType').value;
    const personField = document.getElementById('personField');
    const personLabel = document.getElementById('personLabel');
    const categoryField = document.getElementById('categoryField');

    // שדה אח/אחות
    if (type === 'family_expense' || type === 'advance_to_sibling' || type === 'reimbursement_to_sibling') {
      personField.style.display = 'block';
      if (type === 'advance_to_sibling') personLabel.textContent = 'למי הועבר *';
      else if (type === 'reimbursement_to_sibling') personLabel.textContent = 'למי הוחזר *';
      else personLabel.textContent = 'שם האח/אחות *';
    } else {
      personField.style.display = 'none';
    }

    // קטגוריה - רק בהוצאות
    if (type === 'family_expense' || type === 'parent_funded_expense') {
      categoryField.style.display = 'block';
    } else {
      categoryField.style.display = 'none';
    }
  }

  function validateForm() {
    const type = document.getElementById('txnType').value;
    const date = document.getElementById('txnDate').value;
    const amount = document.getElementById('txnAmount').value;
    const person = document.getElementById('txnPerson').value;

    if (!type) return 'יש לבחור סוג פעולה';
    if (!date) return 'יש לבחור תאריך';
    if (!amount || Number(amount) <= 0) return 'יש להזין סכום תקין';
    if ((type === 'family_expense' || type === 'advance_to_sibling' || type === 'reimbursement_to_sibling') && !person) {
      return 'יש לבחור אח/אחות';
    }
    return null;
  }

  async function saveTransaction() {
    const error = validateForm();
    if (error) {
      document.getElementById('formError').textContent = error;
      document.getElementById('formError').style.display = 'block';
      return;
    }

    const saveBtn = document.querySelector('.save-btn');
    saveBtn.textContent = 'שומר...';
    saveBtn.disabled = true;

    try {
      const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

      const type = document.getElementById('txnType').value;
      const person = document.getElementById('txnPerson').value;
      const date = document.getElementById('txnDate').value;
      const amount = Number(document.getElementById('txnAmount').value);
      const category = document.getElementById('txnCategory').value;
      const description = document.getElementById('txnDescription').value.trim();
      const notes = document.getElementById('txnNotes').value.trim();

      const txnData = {
        type,
        date,
        amount,
        category: category || '',
        description: description || '',
        notes: notes || '',
        personId: person || null,
        createdBy: localStorage.getItem('mama_user_id'),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        status: 'active'
      };

      await addDoc(collection(window.db, 'transactions'), txnData);

      closeAddScreen();
      await loadDashboard();

    } catch(e) {
      console.error('שגיאה בשמירה:', e);
      document.getElementById('formError').textContent = 'שגיאה בשמירה, נסה שוב';
      document.getElementById('formError').style.display = 'block';
    } finally {
      saveBtn.textContent = 'שמור פעולה';
      saveBtn.disabled = false;
    }
  }

  function renderSiblingCards(transactions) {
    const siblings = [
      { id: 'dadi', name: 'דדי' },
      { id: 'eti', name: 'אתי' },
      { id: 'orly', name: 'אורלי' }
    ];

    const container = document.getElementById('siblingCards');
    container.innerHTML = '';

    siblings.forEach(sibling => {
      const myTransactions = transactions.filter(t => t.personId === sibling.id);
      const ownExpenses = myTransactions.filter(t => t.type === 'family_expense').reduce((s, t) => s + t.amount, 0);
      const advances = myTransactions.filter(t => t.type === 'advance_to_sibling').reduce((s, t) => s + t.amount, 0);
      const reimbursements = myTransactions.filter(t => t.type === 'reimbursement_to_sibling').reduce((s, t) => s + t.amount, 0);
      const netBalance = (advances + reimbursements) - ownExpenses;

      let statusClass, statusText;
      if (netBalance > 0) { statusClass = 'status-credit'; statusText = 'נשארה יתרה ביד'; }
      else if (netBalance < 0) { statusClass = 'status-owed'; statusText = 'מגיע לו כסף'; }
      else { statusClass = 'status-balanced'; statusText = 'מאוזן'; }

      const card = document.createElement('div');
      card.className = 'sibling-card';
      card.onclick = () => openHistory('sibling_' + sibling.id);
      card.innerHTML = `
        <div class="sibling-header">
          <div class="sibling-name">${sibling.name}</div>
          <div class="sibling-status ${statusClass}">${statusText}</div>
        </div>
        <div class="sibling-rows">
          <div class="sibling-row"><span>הוציא מכיסו</span><span>₪${ownExpenses.toLocaleString()}</span></div>
          <div class="sibling-row"><span>קיבל מכספי ההורה</span><span>₪${advances.toLocaleString()}</span></div>
          <div class="sibling-row"><span>קיבל החזרים</span><span>₪${reimbursements.toLocaleString()}</span></div>
          <div class="sibling-balance-row">
            <span>יתרה נטו</span>
            <span style="color:${netBalance > 0 ? '#e65100' : netBalance < 0 ? '#c62828' : '#2e7d32'}">
              ${netBalance >= 0 ? '₪' + netBalance.toLocaleString() : '-₪' + Math.abs(netBalance).toLocaleString()}
            </span>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // פתיחת היסטוריה (יושלם בפרק 4)
  function openHistory(type) {
    console.log('פתיחת היסטוריה:', type);
  }

  // טעינת נתונים לדשבורד
  async function loadDashboard() {
    try {
      const { collection, getDocs, query, where } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const q = query(collection(window.db, 'transactions'), where('status', '==', 'active'));
      const snapshot = await getDocs(q);
      const transactions = [];
      snapshot.forEach(doc => transactions.push({ id: doc.id, ...doc.data() }));

      let familyExpense = 0, parentFunded = 0, advances = 0, reimbursements = 0;

      transactions.forEach(t => {
        if (t.type === 'family_expense') familyExpense += t.amount;
        if (t.type === 'parent_funded_expense') parentFunded += t.amount;
        if (t.type === 'advance_to_sibling') advances += t.amount;
        if (t.type === 'reimbursement_to_sibling') reimbursements += t.amount;
      });

      document.getElementById('totalFamilyExpense').textContent = '₪' + familyExpense.toLocaleString();
      document.getElementById('totalParentFunded').textContent = '₪' + parentFunded.toLocaleString();
      document.getElementById('totalAdvances').textContent = '₪' + advances.toLocaleString();
      document.getElementById('totalReimbursements').textContent = '₪' + reimbursements.toLocaleString();
      document.getElementById('totalTransactions').textContent = transactions.length;

      renderSiblingCards(transactions);
      if (transactions.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
      }
    } catch(e) {
      console.error('שגיאה בטעינת נתונים:', e);
    }
  }

  // בדיקה אם כבר נכנס
  function initApp() {
    const savedUser = localStorage.getItem('mama_user_name');
    if (savedUser) {
      showDashboard(savedUser);
    }
  }

  if (window.firebaseReady) {
    initApp();
  } else {
    window.addEventListener('firebaseReady', initApp);
  }

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
